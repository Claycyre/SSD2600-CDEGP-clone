services:
  app-build:
    build:
      context: ./
      dockerfile: ./Dockerfile
      target: app-build
    develop:
      watch:
        - action: rebuild 
          path: ./
          include: 
            - "*.csproj"
            - Dockerfile

  app:
    build:
      context: ./
      dockerfile: ./Dockerfile
      target: app
    depends_on:
      app-build: 
        condition: service_completed_successfully
        restart: true
      mssql:
        condition: service_healthy
    ports:
      - 5202:5202
    environment:
      ConnectionStrings:DefaultConnection: "Server=tcp:mssql;Initial Catalog=appdb;User ID=sa;Password=P@ssw0rd;TrustServerCertificate=True"
    develop:
      watch:
        - action: rebuild
          path: ./
          include:
            - "*.csproj"
            - Properties/
            - Dockerfile

        - action: rebuild
          path: ./
          include:
            - deploy/dev/app

        - action: sync+exec
          path: ./Data/Migrations
          target: /App/Data/Migrations
          exec:
            command: dotnet ef database update

        - action: sync
          path: ./
          target: /App
          ignore:
            - .git/
            - .vs/
            - .vscode/
            - node_modules/
            - dist/
            - "*.log"
            - "*.csproj"
            - Properties/
            - Dockerfile
            - compose.yaml
            - deploy/dev/app

  mssql:
    build:
      context: ./
      dockerfile: ./Dockerfile
      target: mssql 
    ports:
      - 1433:1433
    environment: 
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: P@ssw0rd
      MSSQL_DATABASE: master
      MSSQL_PID: Express
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "P@ssw0rd", "-Q", "SELECT 1", "-No"]
      interval: 5s
      timeout: 5s
      retries: 5
