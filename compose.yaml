services:
  app:
    build:
      context: ./
      dockerfile: ./Dockerfile
      target: app
    ports:
      - 5202:5202
    develop:
      watch:
        - action: rebuild
          path: Dockerfile
        - action: rebuild
          path: compose.yaml
        - action: rebuild
          path: deploy/dev
        - action: sync
          path: ./
          target: /App
          ignore:
            - .git/
            - .vs/
            - .vscode/
            - node_modules/
            - dist/
            - "*.log"

  mssql:
    build:
      context: ./
      dockerfile: ./Dockerfile
      target: mssql 
    ports:
      - 1433:1433
    environment: 
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: P@ssw0rd
      MSSQL_DATABASE: master
      MSSQL_PID: Express
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "P@ssw0rd", "-Q", "SELECT 1", "-No"]
      interval: 5s
      timeout: 5s
      retries: 5
