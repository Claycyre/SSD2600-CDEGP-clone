services:
  app:
    build:
      context: ./
      dockerfile: ./Dockerfile
      target: app
    ports:
      - 5202:5202

  backend:
    build:
      context: ./
      dockerfile: ./Dockerfile
      target: backend-dev
    depends_on:
      mssql:
        condition: service_healthy

  mssql:
    build:
      context: ./
      dockerfile: ./Dockerfile
      target: backend-dev
    ports:
      - 1433:1433
    environment: 
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: P@ssw0rd
      MSSQL_DATABASE: master
      MSSQL_PID: Express
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "P@ssw0rd", "-Q", "SELECT 1", "-No"]
      interval: 5s
      timeout: 5s
      retries: 5
